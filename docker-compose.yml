services:
  postgres:
    image: postgres:16-alpine
    container_name: bookmanagement-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - bookdb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-bookdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bookdb-data: